<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Site Verification</title>
</head>
<body>
<!--
  ไฟล์นี้ใช้สำหรับ verify Google Search Console แบบ HTML File Method

  วิธีใช้:
  1. ไปที่ https://search.google.com/search-console/
  2. เพิ่ม Property → เลือก URL prefix → ใส่ https://southsteel.co.th
  3. เลือกวิธียืนยัน: "HTML file"
  4. ดาวน์โหลดไฟล์ google[XXXXXXXX].html ที่ Google ให้มา
  5. นำไฟล์นั้นมาวางใน root folder แทนที่ไฟล์นี้
  6. Deploy ขึ้น server แล้วกด "Verify" ใน Search Console

  หรือใช้วิธี HTML Tag แทน:
  - คัดลอก <meta name="google-site-verification" content="XXXXX">
  - วางใน <head> ของทุกหน้า HTML แทนที่ VERIFICATION_CODE ที่มีอยู่แล้ว
-->
google-site-verification: [VERIFICATION_CODE].html
</body>
</html>
